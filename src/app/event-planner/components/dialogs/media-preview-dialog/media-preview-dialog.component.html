<div class="preview-header">
  <div class="preview-header-left">
    <i *ngIf="isYouTube" class="fa-brands fa-youtube preview-platform-icon yt"></i>
    <i *ngIf="isDrive" class="fa-brands fa-google-drive preview-platform-icon drive"></i>
    <i *ngIf="!isYouTube && !isDrive" class="fa-solid fa-globe preview-platform-icon"></i>
    <div>
      <h3 class="preview-title">{{ data.title }}</h3>
      <span class="preview-platform-label">
        {{ isYouTube ? 'YouTube' : isDrive ? 'Google Drive' : 'Enlace externo' }}
      </span>
    </div>
  </div>
  <button class="preview-close-btn" (click)="close()">
    <i class="fa-solid fa-xmark"></i>
  </button>
</div>

<div class="preview-body">

  <!-- Embedded player -->
  <div class="preview-frame-wrapper" *ngIf="canEmbed && safeEmbedUrl">
    <iframe
      [src]="safeEmbedUrl"
      class="preview-frame"
      frameborder="0"
      allowfullscreen
      allow="autoplay; encrypted-media; picture-in-picture">
    </iframe>
  </div>

  <!-- Fallback: cannot embed -->
  <div class="preview-fallback" *ngIf="!canEmbed">
    <div class="fallback-icon">
      <i class="fa-solid fa-link-slash"></i>
    </div>
    <p class="fallback-title">No se puede mostrar vista previa</p>
    <p class="fallback-desc">Este enlace no es de YouTube ni Google Drive, o la URL no tiene el formato esperado.</p>
    <button class="ep-btn ep-btn-primary" (click)="openExternal()">
      <i class="fa-solid fa-arrow-up-right-from-square"></i> Abrir en nueva pestaña
    </button>
  </div>

</div>

<div class="preview-footer">
  <a class="preview-url" [href]="data.url" target="_blank" rel="noopener">
    <i class="fa-solid fa-link"></i>
    <span>{{ data.url }}</span>
    <i class="fa-solid fa-arrow-up-right-from-square"></i>
  </a>
  <div class="preview-footer-actions">
    <button class="ep-btn ep-btn-ghost" (click)="openExternal()">
      <i class="fa-solid fa-arrow-up-right-from-square"></i> Abrir
    </button>
    <button class="ep-btn ep-btn-primary" (click)="close()">
      <i class="fa-solid fa-check"></i> Cerrar
    </button>
  </div>
</div>
